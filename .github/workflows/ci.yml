name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: casino
          POSTGRES_PASSWORD: casino
          POSTGRES_DB: casino
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U casino -d casino"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install backend deps
        run: make install
      - name: Migrate
        env:
          DATABASE_URL: postgresql+asyncpg://casino:casino@localhost:15432/casino
          REDIS_URL: redis://localhost:16379/0
          JWT_SECRET_KEY: ci-test-secret-key-min-32-chars-long
        run: make migrate
      - name: Lint
        run: make lint
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://casino:casino@localhost:15432/casino
          REDIS_URL: redis://localhost:16379/0
          JWT_SECRET_KEY: ci-test-secret-key-min-32-chars-long
        run: make test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
